- name: bootstrap dev machine
  hosts: localhost
  gather_facts: true # Required to auto-discover your 'debian' runtime environment
  vars:
    nvm_user: "{{ ansible_env.USER }}" # Gracefully falls back to active shell user
    node_version: "22"                 # Target runtime version for Node
    oauth2_version: "7.9.0"            # Target oauth2-proxy application version

  tasks:
    - name: Download and install NVM
      ansible.builtin.shell:
        cmd: |
          curl -o- https://githubusercontent.com | bash
      args:
        creates: "/home/{{ nvm_user }}/.nvm/nvm.sh"
      become_user: "{{ nvm_user }}"

    - name: Source NVM and install Node.js
      ansible.builtin.shell:
        cmd: |
          source "/home/{{ nvm_user }}/.nvm/nvm.sh"
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}
      args:
        executable: /bin/bash
      become_user: "{{ nvm_user }}"

    - name: Delete old copy of code-server if it exists
      ansible.builtin.file:
        path: /usr/bin/code-server
        state: absent
      become: true

    - name: Update apt cache and upgrade system packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: yes
      become: true

    - name: Create a source workspace directory
      ansible.builtin.file:
        path: "/home/{{ nvm_user }}/source"
        state: directory
        mode: '0755'
        owner: "{{ nvm_user }}"
        group: "{{ nvm_user }}"
      become: yes

    - name: install code-server via official bootstrap script
      ansible.builtin.shell:
        cmd: curl -fsSL https://code-server.dev/install.sh | sh
      args:
        creates: /usr/bin/code-server
      register: app_install_result

    - name: Enable code-server systemd multi-user template service
      ansible.builtin.systemd:
        name: "code-server@{{ nvm_user }}.service"
        enabled: yes
      become: yes

    - name: Creates user directory structure for code-server configuration
      ansible.builtin.file:
        path: "/home/{{ nvm_user }}/.config/code-server"
        state: directory
        mode: '0755'
        owner: "{{ nvm_user }}"
        group: "{{ nvm_user }}"

    - name: Copy code-server base system configuration
      ansible.builtin.copy:
        src: code-server-config.yml
        dest: "/home/{{ nvm_user }}/.config/code-server/config.yaml"
        force: no
        owner: "{{ nvm_user }}"
        group: "{{ nvm_user }}"
      become: yes

    - name: Fetch oauth2-proxy application binary release tarball
      ansible.builtin.get_url:
        url: "https://github.com{{ oauth2_version }}/oauth2-proxy-v{{ oauth2_version }}.linux-amd64.tar.gz"
        dest: "/tmp/oauth2-proxy.tar.gz"
        mode: '0644'

    - name: Extract target binary directory into default bin paths
      ansible.builtin.unarchive:
        src: "/tmp/oauth2-proxy.tar.gz"
        dest: "/usr/local/bin"
        remote_src: yes
        extra_opts: ["--strip-components=1"]
        creates: "/usr/local/bin/oauth2-proxy"
      become: yes

    - name: Apply context values over oauth2-proxy service template file
      ansible.builtin.template:
        src: oauth2-proxy.service.j2
        dest: /etc/systemd/system/oauth2-proxy.service
        mode: '0644'
      become: yes

    - name: Transfer runtime application configuration file sample
      ansible.builtin.copy:
        src: oauth2-proxy.cfg.sample
        dest: /etc/oauth2-proxy.cfg
        force: no
        owner: "{{ nvm_user }}"
        group: "{{ nvm_user }}"
      become: yes

    - name: Verify that the background update cron job uses custom virtualenv path
      ansible.builtin.cron:
        name: "update from github"
        minute: "0"
        hour: "0"
        user: "{{ nvm_user }}"
        job: "/opt/ansible_env/bin/ansible-pull -oU https://github.com/rhildred/ansible-vscode.git"

    - name: Verify system runtime status if updates require reboots
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Perform machine software reboots if system flag is detected
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required_file.stat.exists

    - name: Force systemd state flush and assert code-server is active
      ansible.builtin.systemd:
        name: "code-server@{{ nvm_user }}.service"
        state: restarted
        enabled: yes
        daemon_reload: yes
      become: yes
      when: app_install_result.changed
